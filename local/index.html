<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
</head>
<body style="background: #000;">
     <link rel="icon" type="image/png" href="myicon.png">

    <script>
        const dbName = "AppEngineDB";
        const storeName = "Storage";

        async function startApp() {
            const db = await new Promise((resolve) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName);
                    }
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => resolve(null);
            });

            const urlParams = new URLSearchParams(window.location.search);
            const addonUrl = urlParams.get('addon');
            let targetUrl;

            if (addonUrl && db) {
                targetUrl = addonUrl;
                await new Promise((resolve) => {
                    const tx = db.transaction(storeName, "readwrite");
                    tx.objectStore(storeName).put(targetUrl, 'last_active_url');
                    tx.oncomplete = () => resolve();
                });
            } else if (db) {
                const savedUrl = await new Promise((resolve) => {
                    const tx = db.transaction(storeName, "readonly");
                    const request = tx.objectStore(storeName).get('last_active_url');
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => resolve(null);
                });
                targetUrl = savedUrl || 'main.html';
            } else {
                targetUrl = 'main.html';
            }
            window.location.replace(targetUrl);
        }

        startApp();
    </script>
</body>
</html>
