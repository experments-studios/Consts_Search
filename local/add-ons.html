<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pluget Search Add-ons </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="myicon.png">
    <style>
        *, *::before, *::after {
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        :root {
            --primary-text-color: #f1f3f4; 
            --secondary-text-color: #9aa0a6; 
            --background-color: #0f172a; 
            --surface-color: rgba(30, 41, 59, 0.7); 
            --accent-color: #38bdf8; 
            --logo-main-color: #2dd4bf; 
            --glass-border: rgba(255, 255, 255, 0.1);
            --border-radius-lg: 20px; 
            --transition-speed: 0.3s;
        }

        body.light {
            --primary-text-color: #1e293b;
            --secondary-text-color: #64748b;
            --background-color: #f8fafc;
            --surface-color: rgba(255, 255, 255, 0.8);
            --accent-color: #0284c7; 
            --logo-main-color: #0d9488; 
            --glass-border: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--background-color);
            color: var(--primary-text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column; 
            gap: 20px; 
            padding: 20px;
            /* Arka plana hafif bir gradyan ekleyelim */
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            transition: background var(--transition-speed);
        }

        body.light {
            background: radial-gradient(circle at top right, #e2e8f0, #f8fafc);
        }

        .container {
            background: var(--surface-color);
            backdrop-filter: blur(12px); /* Cam efekti */
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px; 
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container h2 {
            margin-bottom: 25px;
            color: var(--logo-main-color);
            text-align: center;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        input[type="text"] {
            padding: 12px 16px;
            font-size: 15px;
            border: none;
            background: transparent;
            color: var(--primary-text-color);
            flex: 1;
        }

        input[type="text"]:focus {
            outline: none;
        }

        button {
            background: var(--accent-color);
            color: white; 
            font-weight: 600;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all var(--transition-speed);
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        #cookieList {
            list-style: none;
            width: 100%;
            max-width: 450px;
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--accent-color) transparent;
        }

        /* Liste elemanları için özel tasarım */
        #cookieList li {
            background: var(--surface-color);
            margin-bottom: 10px;
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #cookieList li:hover {
            background: rgba(56, 189, 248, 0.1);
            border-color: var(--accent-color);
            transform: scale(1.02);
        }

        .cookie-info {
            display: flex;
            flex-direction: column;
        }

        .cookie-name {
            font-weight: 600;
            font-size: 15px;
        }

        .cookie-url {
            font-size: 12px;
            color: var(--secondary-text-color);
            margin-top: 4px;
        }

        .back-link {
            color: var(--secondary-text-color);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
            margin-top: 10px;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        /* Scrollbar güzelleştirme */
        #cookieList::-webkit-scrollbar { width: 5px; }
        #cookieList::-webkit-scrollbar-thumb { background: var(--accent-color); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>install add-ons</h2>
        <div class="input-group">
            <input type="text" id="cookieName" placeholder="addon name">
            <button onclick="addAndGo()">ADD</button>
        </div>
    </div>

    <ul id="cookieList">
        </ul>

    <a href="index.html" class="back-link">← Back to Search</a>

    <script>
        // ... (Senin mevcut IndexedDB ve JS mantığın burada aynen kalabilir) ...
        // Sadece görselleştirme kısmını (loadCookies içindeki li oluşturma) biraz güncelledim
        
        let db;
        const DB_NAME = "CookieURLDB"; 
        const DB_VERSION = 1;
        const STORE_NAME = "cookies"; 

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onsuccess = (e) => { db = e.target.result; resolve(db); };
                request.onupgradeneeded = (e) => {
                    db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: "name" });
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function loadCookies() {
            const cookieList = document.getElementById("cookieList");
            cookieList.innerHTML = ''; 
            try {
                const transaction = db.transaction([STORE_NAME], "readonly");
                const cookies = await new Promise(r => {
                    transaction.objectStore(STORE_NAME).getAll().onsuccess = (e) => r(e.target.result);
                });

                if (cookies.length === 0) {
                    cookieList.innerHTML = '<li style="justify-content:center; opacity:0.6;">No projects yet.</li>';
                    return;
                }

                cookies.forEach(cookie => {
                    const li = document.createElement("li");
                    li.innerHTML = `
                        <div class="cookie-info">
                            <span class="cookie-name"> ${cookie.name}</span>
                            <span class="cookie-url">{cookie.url}</span>
                        </div>
                        <span style="color:var(--accent-color)">→</span>
                    `;
                    li.onclick = () => window.location.href = cookie.url; 
                    cookieList.appendChild(li);
                });
            } catch (error) { console.error(error); }
        }

        async function addAndGo() {
            const input = document.getElementById("cookieName");
            const name = input.value.trim();
            if (!name) return alert("Please enter a name");
            const url = `https://plugets.pages.dev?addon=${name}`;
            
            const transaction = db.transaction([STORE_NAME], "readwrite");
            transaction.objectStore(STORE_NAME).put({ name, url });
            transaction.oncomplete = () => {
                loadCookies();
                window.location.href = url;
            };
        }

        document.addEventListener("DOMContentLoaded", async () => {
            if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');
            await initDB();
            await loadCookies();
        });
    </script>
</body>
</html>
